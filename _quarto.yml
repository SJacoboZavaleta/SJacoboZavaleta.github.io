project:
  type: website
  output-dir: docs

website:
  title: "Sergio's Blog"
  description: "Personal things"
  page-navigation: true
  reader-mode: true
  search:
    location: navbar
    type: overlay
  favicon: "Figures/favicon/favicon.ico"
  page-footer:
    background: light
    border: false
    left: "Built with [Quarto](https://quarto.org) y [Cyborg](https://bootswatch.com/cyborg/) theme"
    center: 
      - text: "About"
        file: About.qmd
    right:
      - icon: github
        href: https://github.com/SJacoboZavaleta
      - icon: twitter 
        href: https://twitter.com/JacoboZavaleta
  navbar:
    logo: "Figures/logo.png"
    logo-alt: "A random logo"
    background: primary
    left:
      - text: "Home"
        file: Index.qmd
      - sidebar:blogs
      - text: "Gallery"
        file: Gallery.qmd
      - sidebar:research
      - text: "Sobre mí"
        file: About.qmd
  sidebar:
    - id: blogs
      title: "Blogs"
      style: "docked"
      background: light
      collapse-level: 2
      contents:
        - Blog1.qmd
        - Blog2.qmd
        - Blog3.qmd
        
    - id: research
      title: "Research"
      contents:
        - Research.qmd
  open-graph: true
  twitter-card:
    title: Sergio's Blog
    description: Sergio's Blog
    site: "@JacoboZavaleta"
    creator: "@JacoboZavaleta"

format:
  html:
    lang: en
    theme:
      light: ciborg
      dark: [ciborg, theme-dark.scss]
    css: styles.css
    toc: true